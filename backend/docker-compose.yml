version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gis-postgres-2
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: gis_db_2
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_2:/var/lib/postgresql/data

volumes:
  postgres_data:
